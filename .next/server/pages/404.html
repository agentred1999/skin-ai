<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 · Page Not Found</title>
  <style>
    body {
      background: #0a0a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      font-family: 'Courier New', monospace;
      color: #88ddff;
    }
    .container {
      text-align: center;
      padding: 30px;
      border: 1px solid #1a3a6a;
      border-radius: 30px;
      background: #0d0d2b;
      box-shadow: 0 0 80px rgba(0, 20, 80, 0.4);
      transform: rotate(-1deg);
    }
    .big {
      font-size: 96px;
      font-weight: bold;
      color: #00d4ff;
      text-shadow: 0 0 40px rgba(0, 212, 255, 0.2);
      letter-spacing: 12px;
      margin: 0;
    }
    .sub {
      font-size: 18px;
      opacity: 0.5;
      margin-top: 10px;
      border-top: 1px solid #1a3a6a;
      padding-top: 20px;
    }
    .diag {
      display: inline-block;
      transform: rotate(45deg);
      opacity: 0.1;
      font-size: 40px;
      margin: 10px 0;
    }
    .hint {
      font-size: 12px;
      opacity: 0.2;
      margin-top: 30px;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="big">404</div>
  <div class="diag">◆</div>
  <div class="sub">the page you're looking for<br>is not in this geometry</div>
  <div class="hint">— 45° · bottom 50% —</div>
</div>
</body>
</html>
