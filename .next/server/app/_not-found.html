<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Not Found</title>
  <style>
    body {
      background: #0a0a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #88ddff;
    }
    .container {
      text-align: center;
      padding: 40px;
    }
    .badge {
      display: inline-block;
      transform: rotate(-12deg);
      background: #16224e;
      border: 2px solid #00d4ff;
      border-radius: 24px;
      padding: 20px 40px;
      margin-bottom: 30px;
      box-shadow: 0 0 60px rgba(0, 212, 255, 0.15);
    }
    .badge h1 {
      font-size: 72px;
      margin: 0;
      color: #00d4ff;
      letter-spacing: 8px;
    }
    .sub {
      font-size: 18px;
      opacity: 0.6;
      margin-top: 10px;
    }
    .diagonal-line {
      width: 120px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #00d4ff, transparent);
      margin: 30px auto;
      transform: rotate(-2deg);
    }
    .hint {
      font-size: 14px;
      opacity: 0.3;
      font-family: monospace;
      margin-top: 40px;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="badge">
    <h1>404</h1>
    <div class="sub">page not found</div>
  </div>
  <div class="diagonal-line"></div>
  <p style="opacity:0.5; font-size:14px;">the geometry doesn't align here</p>
  <div class="hint">⚡ 45° · 50% from the bottom ⚡</div>
</div>
</body>
</html>
